name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --project agent
      - name: Run Python tests
        working-directory: agent
        run: uv run python -m pytest

  swift:
    name: Swift build and tests
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --project agent
      - run: swift build --package-path macos
      - run: swift test --package-path macos
      - run: xcodebuild -project macos/VoiceOps.xcodeproj -scheme VoiceOps -configuration Debug -derivedDataPath macos/build CODE_SIGNING_ALLOWED=NO build
      - name: Run the signed native Order Rescue replay
        env:
          VOICEOPS_SKIP_BUILD: "1"
          VOICEOPS_REPLAY_REPORT_OUT: artifacts/native-order-rescue/report.json
          VOICEOPS_REPLAY_SCREENSHOT_OUT: artifacts/native-order-rescue/companion.png
        run: scripts/replay_order_rescue_app.sh
      - name: Package the runnable native app
        run: >-
          ditto -c -k --sequesterRsrc --keepParent
          macos/build/Build/Products/Debug/VoiceOps.app
          artifacts/native-order-rescue/VoiceOps.zip
      - name: Upload native replay evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-order-rescue-${{ github.sha }}
          path: artifacts/native-order-rescue
          if-no-files-found: error
          retention-days: 14

  e2e:
    name: Swift-Python mock exchange
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --project agent
      - run: swift build --package-path macos
      - run: swift run -q --package-path macos voiceops-mock-client
      - name: Run the cross-runtime evaluation
        working-directory: agent
        run: uv run python -m voiceops_agent.evaluation --repo-root .. --output-dir ../artifacts/evaluations/cross-runtime --run-id ci-fixture
      - name: Run the 20-case Order Rescue safety rehearsal
        working-directory: agent
        run: uv run python -m voiceops_agent.evals.order_rescue --runs 20 --output-dir ../artifacts/evaluations/order-rescue
      - name: Render the offline evaluation dashboard
        working-directory: agent
        run: uv run python -m voiceops_agent.evaluation_dashboard --cross-report ../artifacts/evaluations/cross-runtime/latest.json --order-report ../artifacts/evaluations/order-rescue/report.json --output ../artifacts/evaluations/dashboard.html
      - name: Upload deterministic evaluation evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deterministic-evaluations-${{ github.sha }}
          path: artifacts/evaluations
          if-no-files-found: error
          retention-days: 14
