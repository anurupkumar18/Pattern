name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --project agent
      - run: uv run --project agent pytest agent/tests

  swift:
    name: Swift build and tests
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: swift build --package-path macos
      - run: swift test --package-path macos
      - run: xcodebuild -project macos/VoiceOps.xcodeproj -scheme VoiceOps build CODE_SIGNING_ALLOWED=NO

  e2e:
    name: Swift-Python mock exchange
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --project agent
      - run: swift build --package-path macos
      - run: swift run -q --package-path macos voiceops-mock-client
      - run: cd agent && uv run voiceops-eval --repo-root .. --output-dir ../evals/reports --run-id ci-fixture
      - name: Run the 20-case Order Rescue safety rehearsal
        run: cd agent && uv run python -m voiceops_agent.evals.order_rescue --runs 20
